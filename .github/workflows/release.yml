# Standard Release Workflow
# Trigger this from the 'develop' branch (or ak-test-develop for testing).
# For hotfix releases from a hotfix/* branch, use hotfix.yml instead.
#
# TESTING (without touching develop/main):
#   gh workflow run release.yml \
#     --ref ak-test-develop \
#     -f release-version=0.99.0 \
#     -f develop-branch=ak-test-develop \
#     -f main-branch=ak-test-main \
#     -f dry-run=true

name: Release - Standard

on:
  workflow_dispatch:
    inputs:
      release-version:
        description: 'Release version (e.g., 0.16.0)'
        required: true
        type: string
      app-version:
        description: 'Next app version after release (e.g., 0.17.0). Leave blank to auto-increment minor.'
        required: false
        type: string
      develop-branch:
        description: 'Develop branch name. Default: develop. Override for testing (e.g., ak-test-develop).'
        required: false
        type: string
        default: 'develop'
      main-branch:
        description: 'Main branch name. Default: main. Override for testing (e.g., ak-test-main).'
        required: false
        type: string
        default: 'main'
      dry-run:
        description: 'Dry run: build Docker image but skip push, create draft GitHub Release only.'
        required: false
        type: boolean
        default: false
      skip-aphl:
        description: 'Skip APHL ECR push only. Useful for testing without APHL credentials.'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write
  pull-requests: read

jobs:
  release:
    uses: ./.github/workflows/_release_common.yml
    secrets: inherit
    with:
      release-version: ${{ inputs.release-version }}
      app-version: ${{ inputs.app-version }}
      release-type: standard
      develop-branch: ${{ inputs.develop-branch }}
      main-branch: ${{ inputs.main-branch }}
      dry-run: ${{ inputs.dry-run }}
      skip-aphl: ${{ inputs.skip-aphl }}
