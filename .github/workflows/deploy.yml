---
name: Test, Build and Publish to AWS DEV environment

on:
  # push to release/** intentionally removed: release branches are fully managed
  # by _release_common.yml which runs its own quality gates and Docker build.
  pull_request:
    branches:
      - develop
    paths-ignore:
      - '.github/workflows/*'
      - '!.github/workflows/deploy.yml'
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

env:
  GITHUB_REGISTRY_PREFIX: ghcr.io
  GITHUB_REGISTRY_NAME: izgateway
  IMAGE_NAME: ${{ github.repository }}
  BUILD_ID: ${{ github.run_number}}
  BRANCH: ${{ github.ref_name }}

jobs:
  generate-release-timestamp:
    name: Generate release timestamp
    runs-on: ubuntu-latest
    outputs:
      releaseDate: ${{ steps.exposeValue.outputs.releaseDate }}
      application_version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
      - name: Get current date
        id: date
        run: echo "RELEASE_DATE=$(date +'%d%b%Y%H%M%S')" >> "$GITHUB_ENV"
      - name: Expose value
        id: exposeValue
        run: |
          echo "::set-output name=releaseDate::${{ env.RELEASE_DATE }}"
      - name: Get Application Version
        id: get-version
        run: |
          APPLICATION_VERSION=$(npm pkg get version | tr -d '"')
          echo "version=${APPLICATION_VERSION}" >> $GITHUB_OUTPUT
          echo "Application version: ${APPLICATION_VERSION}"

  code-quality-check:
    name: Test and Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
      - name: Configure npm authentication
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "Configuring npm authentication for GitHub Packages..."
          npm config set @izgateway:registry https://npm.pkg.github.com/
          npm config set //npm.pkg.github.com/:_authToken ${NPM_TOKEN}
          echo "✓ npm authentication configured"
      - name: Install Dependencies
        run: npm ci --force
      # - name: Run Jest Unit Tests
      #   run: npm run test
      - name: Lint
        run: npm run code-quality-check

  create-tag:
    name: Create tag
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    needs: [code-quality-check, generate-release-timestamp]
    steps:
      - name: Create tag
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: 'refs/tags/${{ needs.generate-release-timestamp.outputs.releaseDate }}',
              sha: context.sha
            })

  build-and-push-image-aws:
    name: Build and push image to dev aws
    runs-on: ubuntu-latest
    needs: [code-quality-check, generate-release-timestamp]
    permissions:
      contents: write
      packages: write
      pull-requests: write
      repository-projects: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Cache Next.js build
        uses: actions/cache@v6
        with:
          path: |
            .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
            ${{ runner.os }}-nextjs-

      - name: Login to the GitHub Container registry
        if: ${{ contains(github.ref, 'refs/heads/release/') }}
        id: login-ghcr
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ${{ env.GITHUB_REGISTRY_PREFIX }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to the Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9
        with:
          images: |
            ${{ env.GITHUB_REGISTRY_PREFIX }}/${{ env.GITHUB_REGISTRY_NAME }}/izg-transformation-ui,enable=${{ contains(github.ref, 'refs/heads/release/') }}
            ${{ steps.login-ecr.outputs.registry }}/izg-transformation-ui
          tags: |
            type=raw,value=${{ needs.generate-release-timestamp.outputs.application_version }}-${{github.run_number}}
            type=raw,value=${{ needs.generate-release-timestamp.outputs.application_version }}-${{github.run_number}}-release,enable=${{ contains(github.ref, 'refs/heads/release/') }}
            type=raw,value=${{ needs.generate-release-timestamp.outputs.application_version }}-${{github.run_number}}-snapshot,enable=${{ github.ref == 'refs/heads/develop' }}
          flavor: |
            latest=true

      - name: Build and push Docker Xform Console image
        id: docker_build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          provenance: false
          sbom: false
          build-args: |
            BUILD_ID=${{ needs.generate-release-timestamp.outputs.releaseDate }}
            NPM_TOKEN=${{ secrets.NPM_TOKEN }}
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # NOTE: APHL ECR push is now handled by .github/workflows/_release_common.yml
  # as part of the automated release process (release.yml / hotfix.yml).
  # It was removed from this CI workflow to prevent double-building on
  # release/** branch pushes and to keep APHL pushes tied to versioned releases.

  deploy-dev:
    name: Deploy to Dev AWS environment
    runs-on: ubuntu-latest
    needs: [build-and-push-image-aws]
    if: |
      github.event_name == 'schedule' ||
      github.ref == 'refs/heads/develop' ||
      (github.event_name == 'pull_request' && github.base_ref == 'develop')
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Deploy to Dev AWS
        env:
          AWS_REGIONS: ${{ vars.AWS_REGIONS }}
          ECS_DESIRED_COUNT: ${{ vars.ECS_DESIRED_COUNT }}
        run: |
          if [ -z "$AWS_REGIONS" ]; then
            echo "AWS_REGIONS not set, defaulting to us-east-1"
            AWS_REGIONS="us-east-1"
          fi

          if [ -z "$ECS_DESIRED_COUNT" ]; then
            echo "ECS_DESIRED_COUNT not set, defaulting to 1"
            ECS_DESIRED_COUNT="1"
          fi

          for region in $AWS_REGIONS; do
            echo "Update ECS services in $region (starting $ECS_DESIRED_COUNT containers)"
            aws ecs update-service --region $region --cluster xform-console-dev --service xform-console-dev --force-new-deployment --enable-execute-command --desired-count $ECS_DESIRED_COUNT | jq ".service.deployments[].id" &
          done

          wait

          for region in $AWS_REGIONS; do
            echo "Wait for ECS service stability in $region"
            aws ecs wait services-stable --region $region --cluster xform-console-dev --service xform-console-dev &
          done

          wait
