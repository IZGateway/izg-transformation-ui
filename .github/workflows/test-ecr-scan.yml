# TEMPORARY — Inspector2 scan validation (delete after testing)
#
# Standalone harness to validate the release-time Inspector2 scan wiring
# (OpenSpec change add-ecr-inspector2-scan-report-on-release / IGDD-2151)
# WITHOUT cutting a release. It points the poll + report at an image tag that
# already exists in ECR (e.g. the last release, 0.16.0).
#
# It is read-only with respect to this repo and the release process: it only
# assumes the OIDC role, polls `aws inspector2 list-coverage`, and calls the
# shared report workflow. It never builds, tags, pushes, or merges anything.
#
# Requires (same prerequisites as the real release scan jobs):
#   - repo variable `AWS_ROLE_ARN`
#   - the role's trust policy job_workflow_ref allowlist to include BOTH
#       IZGateway/izg-dependency-scripts/.github/workflows/ecr-scan-report.yml@*
#       IZGateway/izg-transformation-ui/.github/workflows/test-ecr-scan.yml@*   (temporary)
#
# CLEANUP: delete this file and remove the test-ecr-scan.yml entry from the
# trust policy once validation is complete.

name: TEST - ECR Inspector2 scan

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: 'Existing ECR tag to scan (must already be pushed to izg-transformation-ui)'
        required: true
        type: string
        default: '0.16.0'

permissions:
  id-token: write
  contents: read

jobs:
  wait-for-inspector2-scan:
    name: Wait for Inspector2 scan
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      id-token: write
      contents: read
    outputs:
      release-date: ${{ steps.meta.outputs.release-date }}
    steps:
      - name: Compute release date (UTC)
        id: meta
        run: echo "release-date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      # TEMPORARY debug — prints the OIDC claims AWS is actually evaluating, so
      # we can diff job_workflow_ref/sub against the role trust policy patterns.
      # job_workflow_ref is not sensitive. Remove with the rest of this file.
      - name: Debug OIDC claims
        run: |
          TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=sts.amazonaws.com" | jq -r '.value')
          PAYLOAD=$(echo "$TOKEN" | cut -d. -f2)
          python3 - "$PAYLOAD" <<'PY'
          import sys, base64, json
          p = sys.argv[1]; p += "=" * (-len(p) % 4)
          d = json.loads(base64.urlsafe_b64decode(p))
          print(json.dumps({k: d.get(k) for k in
            ["aud", "sub", "repository", "repository_owner", "job_workflow_ref", "ref"]}, indent=2))
          PY

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Poll Inspector2 until the image scan completes
        env:
          ECR_REPOSITORY: izg-transformation-ui
          IMAGE_TAG: ${{ inputs.image-tag }}
        run: |
          set -uo pipefail
          # ~20-minute cap; exit early as soon as the scan reports complete.
          DEADLINE=$(( $(date +%s) + 20 * 60 ))
          FILTER="{\"ecrRepositoryName\":[{\"comparison\":\"EQUALS\",\"value\":\"${ECR_REPOSITORY}\"}],\"ecrImageTags\":[{\"comparison\":\"EQUALS\",\"value\":\"${IMAGE_TAG}\"}]}"
          echo "Waiting for Inspector2 to finish scanning ${ECR_REPOSITORY}:${IMAGE_TAG} (cap: ~20m)..."
          while :; do
            SCAN=$(aws inspector2 list-coverage \
              --filter-criteria "$FILTER" \
              --query 'coveredResources[0].scanStatus' \
              --output json 2>/dev/null || echo 'null')
            CODE=$(echo "$SCAN" | jq -r '.statusCode // "NONE"')
            REASON=$(echo "$SCAN" | jq -r '.reason // "NONE"')
            echo "  statusCode=${CODE} reason=${REASON}"
            # reason=SUCCESSFUL => Inspector2 has completed assessing this image.
            if [[ "$REASON" == "SUCCESSFUL" ]]; then
              echo "✓ Inspector2 scan complete."
              exit 0
            fi
            if [[ "$(date +%s)" -ge "$DEADLINE" ]]; then
              echo "::warning::Timed out (~20m) waiting for Inspector2 (last: ${CODE}/${REASON}); proceeding with whatever findings exist."
              exit 0
            fi
            sleep 30
          done

  scan-report:
    name: Inspector2 scan report
    needs: [wait-for-inspector2-scan]
    permissions:
      id-token: write
      contents: read
    # TEMPORARY: pinned to the IGDD-2563 PR branch to validate the jq fix before it
    # ships to @v1. scripts-ref makes the reusable workflow load the scan script from
    # the same branch (its internal checkout otherwise hardcodes v1). Revert both to
    # @v1 / drop scripts-ref once the upstream PR merges and v1 is re-pointed.
    uses: IZGateway/izg-dependency-scripts/.github/workflows/ecr-scan-report.yml@IGDD-2563_ecr-scan-jq-change
    with:
      ecr-repository: izg-transformation-ui
      image-tag: ${{ inputs.image-tag }}
      gh-pkg-name: izgw-transf-ui
      release-date: ${{ needs.wait-for-inspector2-scan.outputs.release-date }}
      aws-region: us-east-1
      scripts-ref: IGDD-2563_ecr-scan-jq-change
