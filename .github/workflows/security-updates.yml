name: Security Updates

on:
  schedule:
    # Run daily at 3:15 AM UTC (avoids conflict with other workflows)
    - cron: '15 3 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install npm-check-updates
        run: npm install -g npm-check-updates
      
      - name: Run ncu and check for updates
        id: ncu_check
        run: |
          echo "Running npm-check-updates with --target minor..."
          ncu --target minor -u > ncu_output.txt 2>&1 || true
          cat ncu_output.txt
          
          if git diff --quiet package.json; then
            echo "has_ncu_changes=false" >> $GITHUB_OUTPUT
            echo "✓ No minor dependency updates available"
          else
            echo "has_ncu_changes=true" >> $GITHUB_OUTPUT
            echo "✓ Minor dependency updates found"
          fi
      
      - name: Update existing overrides
        id: override_check
        run: |
          echo "Updating packages in overrides section..."
          node scripts/update-overrides.js
          
          if git diff --quiet package.json; then
            echo "has_override_changes=false" >> $GITHUB_OUTPUT
            echo "✓ No override updates needed"
          else
            echo "has_override_changes=true" >> $GITHUB_OUTPUT
            echo "✓ Override updates found"
          fi
      
      - name: Add security overrides for vulnerabilities
        id: security_check
        run: |
          echo "Checking for security vulnerabilities in transitive dependencies (all severity levels)..."
          node scripts/add-security-overrides.js
          
          if git diff --quiet package.json; then
            echo "has_security_changes=false" >> $GITHUB_OUTPUT
            echo "✓ No security overrides needed"
          else
            echo "has_security_changes=true" >> $GITHUB_OUTPUT
            echo "✓ Security overrides added"
          fi
      
      - name: Check if any changes were made
        id: final_check
        run: |
          if [[ "${{ steps.ncu_check.outputs.has_ncu_changes }}" == "true" || \
                "${{ steps.override_check.outputs.has_override_changes }}" == "true" || \
                "${{ steps.security_check.outputs.has_security_changes }}" == "true" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "✓ Changes detected, proceeding with PR creation"
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✓ No changes detected"
          fi
      
      - name: Stop if no changes
        if: steps.final_check.outputs.has_changes == 'false'
        run: |
          echo "## No Dependency Updates Available" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All dependencies and overrides are up-to-date." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next check:** Next scheduled run or manual trigger" >> $GITHUB_STEP_SUMMARY
          exit 0
      
      - name: Create update branch
        if: steps.final_check.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="automated-security-updates-$(date +%Y%m%d-%H%M%S)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV
          git checkout -b $BRANCH_NAME
          echo "✓ Created branch: $BRANCH_NAME"
      
      - name: Update existing overrides
        if: steps.final_check.outputs.has_changes == 'true'
        run: |
          echo "Updating packages in overrides section..."
          node scripts/update-overrides.js
      
      - name: Add security overrides for vulnerabilities
        if: steps.final_check.outputs.has_changes == 'true'
        run: |
          echo "Checking for security vulnerabilities in transitive dependencies (all severity levels)..."
          node scripts/add-security-overrides.js
      
      - name: Test override removal
        if: steps.final_check.outputs.has_changes == 'true'
        run: |
          echo "Testing if overrides can be removed..."
          node scripts/test-overrides.js
      
      - name: Commit changes
        if: steps.final_check.outputs.has_changes == 'true'
        run: |
          # Ensure package-lock.json is updated with any override changes
          npm install 
          git add package.json package-lock.json
          git commit -m "chore(deps): security and dependency updates

          - Updated dependencies using ncu --target minor
          - Updated existing overrides to latest minor versions
          - Added security overrides for vulnerable transitive dependencies (all severity levels)
          - Removed unnecessary overrides where applicable
          - Updated package-lock.json
          
          Generated by security-updates workflow"
      
      - name: Run code quality checks
        if: steps.final_check.outputs.has_changes == 'true'
        run: |
          echo "Running code quality checks..."
          npm run code-quality-check
      
      - name: Run tests
        if: steps.final_check.outputs.has_changes == 'true'
        run: |
          echo "Running tests..."
          npm run test
        continue-on-error: true
      
      - name: Build application
        if: steps.final_check.outputs.has_changes == 'true'
        run: |
          echo "Building application..."
          npm run build
      
      - name: Run security audit
        if: steps.final_check.outputs.has_changes == 'true'
        run: |
          echo "Running security audit (all severity levels)..."
          npm audit --audit-level=low || echo "::warning::Some vulnerabilities remain after updates"
        continue-on-error: true
      
      - name: Generate change summary
        if: steps.final_check.outputs.has_changes == 'true'
        run: |
          echo "Generating change summary..."
          echo "# Security and Dependency Update Summary" > pr_body.md
          echo "" >> pr_body.md
          echo "## 🔒 Automated Security & Dependency Updates" >> pr_body.md
          echo "" >> pr_body.md
          echo "This PR updates dependencies to their latest **minor versions** and addresses security vulnerabilities at all severity levels." >> pr_body.md
          echo "" >> pr_body.md
          echo "### Changes Made:" >> pr_body.md
          echo "- ✅ Updated dependencies to latest compatible minor versions" >> pr_body.md
          echo "- ✅ Added security overrides for vulnerable transitive dependencies (all severity levels)" >> pr_body.md
          echo "- ✅ Removed unnecessary overrides (where all resolved versions meet requirements)" >> pr_body.md
          echo "- ✅ Updated \`package-lock.json\`" >> pr_body.md
          echo "- ✅ Ran linting, type-checking, and tests" >> pr_body.md
          echo "- ✅ Built application successfully" >> pr_body.md
          echo "" >> pr_body.md
          echo "### Package Changes:" >> pr_body.md
          echo '```diff' >> pr_body.md
          git diff HEAD~1 package.json >> pr_body.md
          echo '```' >> pr_body.md
          echo "" >> pr_body.md
          echo "### Review Checklist:" >> pr_body.md
          echo "- [ ] Review version changes in \`package.json\`" >> pr_body.md
          echo "- [ ] Verify no breaking changes in release notes" >> pr_body.md
          echo "- [ ] Check that all tests pass" >> pr_body.md
          echo "- [ ] Confirm security audit results" >> pr_body.md
          echo "- [ ] Test locally if needed" >> pr_body.md
          echo "" >> pr_body.md
          echo "---" >> pr_body.md
          echo "**Generated:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> pr_body.md
          echo "**Workflow Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> pr_body.md
      
      - name: Push branch
        if: steps.final_check.outputs.has_changes == 'true'
        run: |
          git push origin ${{ env.branch_name }}
          echo "✓ Pushed branch: ${{ env.branch_name }}"
      
      - name: Create Pull Request
        if: steps.final_check.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_BODY=$(cat pr_body.md)
          gh pr create \
            --base develop \
            --head ${{ env.branch_name }} \
            --title "chore(deps): security and dependency updates" \
            --body "$PR_BODY"
          
          echo "## ✅ Pull Request Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "A pull request has been created with the dependency updates." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ env.branch_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Base:** \`develop\`" >> $GITHUB_STEP_SUMMARY
